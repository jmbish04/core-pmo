name: Deploy GAS Addon

on:
  push:
    paths:
      - "gas-addon/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.15.4"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd gas-addon
          pnpm install
      - name: Create clasprc.json
        env:
          CLASPRC_JSON_RAW: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -n "$CLASPRC_JSON_RAW" ]; then
            python scripts/gas-addon/setup-clasp.py
          else
            echo "Skipping clasprc.json creation, secret is empty"
          fi
      - name: Create .clasp.json
        run: |
          cd gas-addon
          if [ -n "${{ secrets.GAS_SCRIPT_ID }}" ]; then
            echo "{\"scriptId\":\"${{ secrets.GAS_SCRIPT_ID }}\",\"rootDir\":\"dist\"}" > .clasp.json
          else
            echo "Skipping .clasp.json creation, secret is empty"
          fi
      - name: Build and Push to GAS
        run: |
          HAS_CLASPRC="false"
          if [ -f ~/.clasprc.json ] || [ -f .clasprc.json ]; then
            HAS_CLASPRC="true"
          fi
          
          if [ "$HAS_CLASPRC" = "false" ]; then
            echo "❌ Missing CLASPRC_JSON secret (this generates .clasprc.json)"
          fi
          if [ ! -f gas-addon/.clasp.json ]; then
            echo "❌ Missing GAS_SCRIPT_ID secret (this generates gas-addon/.clasp.json)"
          fi
          
          if [ "$HAS_CLASPRC" = "true" ] && [ -f gas-addon/.clasp.json ]; then
            pnpm run gas:build
            pnpm run gas:deploy
          else
            echo "Missing clasp configuration. Skipping push."
          fi
