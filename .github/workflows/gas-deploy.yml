name: Deploy GAS Addon

on:
  push:
    paths:
      - 'gas-addon/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Clasp
        run: npm install -g @google/clasp
      - name: Create clasprc.json
        run: |
          echo '${{ secrets.CLASP_CREDS }}' > ~/.clasprc.json
      - name: Create .clasp.json
        run: |
          cd gas-addon
          echo "{\"scriptId\":\"${{ secrets.GAS_SCRIPT_ID }}\",\"rootDir\":\".\"}" > .clasp.json
      - name: Push to GAS
        run: |
          cd gas-addon
          clasp push -f
