name: Deploy GAS Addon

on:
  push:
    branches:
      - main
    paths:
      - 'gas-addon/**'
      - 'scripts/**'
      - '.github/workflows/gas-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp Globally
        run: npm install -g @google/clasp

      - name: Install Dependencies
        run: npm install

      - name: Provide Authentication (Python Setup)
        run: python3 scripts/setup-clasp.py
        env:
          CLASPRC_JSON_RAW: ${{ secrets.CLASPRC_JSON }}

      - name: Configure Clasp for Addon
        run: |
          cd gas-addon
          if [ -n "${{ secrets.GAS_SCRIPT_ID }}" ]; then
            echo "{\"scriptId\":\"${{ secrets.GAS_SCRIPT_ID }}\",\"rootDir\":\".\"}" > .clasp.json
          else
            echo "Warning: GAS_SCRIPT_ID secret is missing."
          fi

      # Uncomment if you port over validation from gas-recipe-to-doc
      # - name: Validate Configuration
      #   run: npm run gas:validate

      - name: Execute Production Deployment
        run: npm run gas:deploy